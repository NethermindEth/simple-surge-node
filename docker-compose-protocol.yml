    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/deploy-userops-submitter.sh
    env_file:
      - .env
    environment:
      FOUNDRY_PROFILE: layer1o
      BROADCAST: ${BROADCAST}
      VERIFY: ${VERIFY}
      SLOW: ${SLOW}
      VERIFY_ARG: ${VERIFY_ARG}
      OWNER_ADDRESS: ${SUBMITTER_PUBLIC_KEY}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - userops-submitter-deployer

  surge-genesis-generator:
    image: ${PROTOCOL_IMAGE}
    container_name: surge-genesis-generator
    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/generate-genesis.sh
    env_file:
      - .env
    environment:
      # SEED_ADDRESS: ${PUBLIC_KEY}
      CONTRACT_OWNER: ${PUBLIC_KEY}
      CHAIN_ID: ${L2_CHAIN_ID}
      REMOTE_SIGNAL_SERVICE: ${REALTIME_SIGNAL_SERVICE}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
