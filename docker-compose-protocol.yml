services:
  surge-l1-deployer:
    image: ${PROTOCOL_IMAGE}
    container_name: surge-l1-deployer
    pull_policy: always
    tty: true
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/deploy-surge-l1.sh
    env_file:
      - .env
    environment:
      FOUNDRY_PROFILE: layer1o
      BROADCAST: ${BROADCAST}
      VERIFY: ${VERIFY}
      SLOW: ${SLOW}
      VERIFY_ARG: ${VERIFY_ARG}
      MOCK_PROOF_MODE: ${MOCK_PROOF_MODE}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      CONTRACT_OWNER: ${PUBLIC_KEY}
      PRIVATE_KEY: ${PRIVATE_KEY}
      # PERMISSIONLESS_PROVING_DELAY: 42300
      GENESIS_BLOCK_HASH: ${L2_GENESIS_HASH}
      NUM_PROOF_THRESHOLD: 1
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - l1-deployer

  surge-multicall-deployer:
    image: ${PROTOCOL_IMAGE}
    container_name: surge-multicall-deployer
    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/deploy-multicall.sh
    env_file:
      - .env
    environment:
      FOUNDRY_PROFILE: layer1o
      BROADCAST: ${BROADCAST}
      VERIFY: ${VERIFY}
      SLOW: ${SLOW}
      VERIFY_ARG: ${VERIFY_ARG}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - multicall-deployer

  surge-userops-submitter-deployer:
