    container_name: surge-genesis-generator
    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/generate-genesis.sh
    env_file:
      - .env
    environment:
      # SEED_ADDRESS: ${PUBLIC_KEY}
      CONTRACT_OWNER: ${PUBLIC_KEY}
      CHAIN_ID: ${L2_CHAIN_ID}
      REMOTE_SIGNAL_SERVICE: ${SHASTA_SIGNAL_SERVICE}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
