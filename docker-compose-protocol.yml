    container_name: surge-multicall-deployer
    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/deploy-multicall.sh
    env_file:
      - .env
    environment:
      FOUNDRY_PROFILE: layer1o
      BROADCAST: ${BROADCAST}
      VERIFY: ${VERIFY}
      SLOW: ${SLOW}
      VERIFY_ARG: ${VERIFY_ARG}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - multicall-deployer

  surge-userops-submitter-deployer:
    image: ${PROTOCOL_IMAGE}
    container_name: surge-userops-submitter-deployer
    pull_policy: always
    volumes:
      - ./deployer:/deployer
      - ./deployment:/deployment
    entrypoint:
      - /bin/sh
      - -c
      - /deployer/deploy-userops-submitter.sh
    env_file:
      - .env
    environment:
      FOUNDRY_PROFILE: layer1o
      BROADCAST: ${BROADCAST}
      VERIFY: ${VERIFY}
      SLOW: ${SLOW}
      VERIFY_ARG: ${VERIFY_ARG}
      OWNER_ADDRESS: ${SUBMITTER_PUBLIC_KEY}
      FORK_URL: ${L1_ENDPOINT_HTTP}
      PRIVATE_KEY: ${PRIVATE_KEY}
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
