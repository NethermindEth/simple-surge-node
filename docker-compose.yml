services:
  # L2 stack components
  nethermind_execution_client:
    image: ${NETHERMIND_CLIENT_IMAGE}
    container_name: l2-nethermind-execution-client
    restart: unless-stopped
    pull_policy: always
    stop_grace_period: 3m
    tty: true
    volumes:
      - ./execution-data:/data/surge
      - ./static/jwtsecret:/tmp/jwt/jwtsecret
      - ${CHAINSPEC_PATH_ON_HOST:-./static/hoodi/chainspec.json}:/chainspec.json
      - ./script:/script
      - ./NLog.config:/nethermind/NLog.config
    networks:
      - surge
    ports:
      - ${L2_NETWORK_DISCOVERY_PORT}:${L2_NETWORK_DISCOVERY_PORT}/tcp
      - ${L2_NETWORK_DISCOVERY_PORT}:${L2_NETWORK_DISCOVERY_PORT}/udp
      - ${L2_METRICS_PORT}:${L2_METRICS_PORT}
      - ${L2_HTTP_PORT}:${L2_HTTP_PORT}
      - ${L2_WS_PORT}:${L2_WS_PORT}
      - ${L2_ENGINE_API_PORT}:${L2_ENGINE_API_PORT}
    env_file:
      - .env
    environment:
      TAIKO_INBOX: ${TAIKO_INBOX}
    entrypoint:
      - "/script/start-nethermind.sh"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.kurtosistech.custom.metrics_enabled: "true"
      com.kurtosistech.custom.metrics_port: "${L2_METRICS_PORT}"
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8547'"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 10s
    profiles:
      - driver
      - catalyst
      - prover
      - spammer
      - blockscout

  taiko_client_driver:
    image: ${TAIKO_CLIENT_IMAGE}
    container_name: l2-taiko-consensus-client
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
        restart: true
    volumes:
      - ./driver-data:/driver-data
      - ./execution-data:/data/surge
      - ./static/jwtsecret:/tmp/jwt/jwtsecret
      - ./script:/script
    ports:
      - 6060:6060
      - 1235:1235
    env_file:
      - .env
    environment:
      TAIKO_INBOX: ${TAIKO_INBOX}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - "/script/start-driver.sh"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.metrics_enabled: "true"
      com.kurtosistech.custom.metrics_port: "6060"
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - driver
      - catalyst
      - prover
      - spammer
      - blockscout

  web3signer-l1:
    container_name: web3signer-l1
    image: consensys/web3signer:25.11.0
    restart: unless-stopped
    pull_policy: missing
    volumes:
      - ./configs/web3signer:/config:ro
    networks:
      - surge
    command:
      - '--key-store-path=/config'
      - '--http-host-allowlist=*'
      - 'eth1'
      - '--chain-id=${L1_CHAIN_ID}'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/upcheck || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - web3signer

  web3signer-l2:
    container_name: web3signer-l2
    image: consensys/web3signer:25.11.0
    restart: unless-stopped
    pull_policy: missing
    volumes:
      - ./configs/web3signer:/config:ro
    networks:
      - surge
    command:
      - '--key-store-path=/config'
      - '--http-host-allowlist=*'
      - 'eth1'
      - '--chain-id=${L2_CHAIN_ID}'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/upcheck || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - web3signer

  catalyst:
    image: ${CATALYST_IMAGE}
    container_name: l2-catalyst-node
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
        restart: true
      taiko_client_driver:
        condition: service_started
    volumes:
      - ./static/jwtsecret:/tmp/jwtsecret
      - ./script:/script
    ports:
      - 9898:9898
      - 4545:4545
    env_file:
      - .env
    environment:
      # Signer
      CATALYST_NODE_ECDSA_PRIVATE_KEY: ${OPERATOR_PRIVATE_KEY}
      # Mock prover
      MOCK_MODE: ${MOCK_MODE}
      # L1
      L1_RPC_URLS: ${L1_ENDPOINT_WS}
      L1_BEACON_URL: ${L1_BEACON_HTTP}
      # L2
      TAIKO_GETH_RPC_URL: ${L2_ENDPOINT_WS}
      TAIKO_GETH_AUTH_RPC_URL: ${L2_AUTH_HTTP}
      TAIKO_ANCHOR_ADDRESS: ${TAIKO_ANCHOR}
      TAIKO_DRIVER_URL: ${TAIKO_DRIVER_URL}
      # Realtime inbox + multicall
      REALTIME_INBOX_ADDRESS: ${REALTIME_INBOX}
      PROPOSER_MULTICALL_ADDRESS: ${MULTICALL_ADDRESS}
      # Bridge + SignalService addresses
      L1_BRIDGE_ADDRESS: ${REALTIME_BRIDGE}
      L1_SIGNAL_SERVICE_ADDRESS: ${REALTIME_SIGNAL_SERVICE}
      L2_BRIDGE_ADDRESS: ${L2_BRIDGE}
      L2_SIGNAL_SERVICE_ADDRESS: ${L2_SIGNAL_SERVICE}
      # surge_simulateReturnMessage's trace logic looks up the L2 bridge under
      # this name (NOT L2_BRIDGE_ADDRESS — that's read by a different catalyst
      # subsystem). Without it, catalyst defaults the L2 bridge to 0x0 and the
      # trace never matches, returning "No outbound Bridge.sendMessage found".
      TAIKO_BRIDGE_L2_ADDRESS: ${L2_BRIDGE}
      # Bridge handler RPC bind. Default in this image is 127.0.0.1:4545 which
      # is not reachable through Docker port forwarding — must be 0.0.0.0.
      BRIDGE_RPC_ADDR: "0.0.0.0:4545"
      # Raiko endpoint
      RAIKO_URL: ${RAIKO_HOST_ZKVM}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.metrics_enabled: "true"
      com.kurtosistech.custom.metrics_port: "9898"
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - catalyst
      - spammer
      - l2-deployer

  raiko:
    image: ${RAIKO_IMAGE}
    container_name: l2-raiko-zk-client
    restart: unless-stopped
    pull_policy: always
    volumes:
      - ./configs:/raiko/config
    ports:
      - 8082:8080
    env_file:
      - .env
    environment:
      RAIKO_CONF_DIR: "/raiko/config"
      BASE_CONFIG_FILE: "config.json"
      BASE_CHAINSPEC_FILE: "chain_spec_list.json"
      RUST_LOG: "info"
      MOCK_KEY: ${PRIVATE_KEY}
    entrypoint:
      - /opt/raiko/bin/raiko-host
      - --config-path=/raiko/config/config.json
      - --chain-spec-path=/raiko/config/chain_spec_list.json
    networks:
      - surge
    profiles:
      - prover
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tx-spammer:
    image: ethpandaops/spamoor:master
    container_name: l2-tx-spammer
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
      taiko_client_driver:
        condition: service_started
      catalyst:
        condition: service_started
    volumes:
      - ./static/spamoor:/config
    ports:
      - 8083:8080
    entrypoint:
      - ./spamoor-daemon
    command:
      - "--rpchost=http://l2-nethermind-execution-client:${L2_HTTP_PORT}"
      - "--startup-spammer=/config/scenario-configs.yml"
      - "--privkey=${PRIVATE_KEY}"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - spammer

  blockscout-postgres:
    image: postgres:alpine
    container_name: l2-blockscout-postgres
    restart: unless-stopped
    pull_policy: always
    volumes:
      - ./blockscout-postgres-data:/var/lib/postgresql
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${BLOCKSCOUT_POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - blockscout

  blockscout-verifer:
    image: ghcr.io/blockscout/smart-contract-verifier:latest
    container_name: l2-blockscout-verif
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
      taiko_client_driver:
        condition: service_started
      blockscout-postgres:
        condition: service_started
    ports:
      - ${VERIFIER_PORT}:${VERIFIER_PORT}
    environment:
      SMART_CONTRACT_VERIFIER__SERVER__HTTP__ADDR: 0.0.0.0:${VERIFIER_PORT}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      APP_USER: app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "./smart-contract-verifier-server"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - blockscout

  blockscout:
    image: ghcr.io/blockscout/blockscout:latest
    container_name: l2-blockscout
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
        restart: true
      taiko_client_driver:
        condition: service_started
      blockscout-postgres:
        condition: service_started
      blockscout-verifer:
        condition: service_started
    ports:
      - ${BLOCKSCOUT_PORT}:${BLOCKSCOUT_PORT}
    environment:
      MICROSERVICE_SC_VERIFIER_URL: http://l2-blockscout-verif:${VERIFIER_PORT}/api
      ECTO_USE_SSL: false
      ETHEREUM_JSONRPC_HTTP_URL: http://${BLOCKSCOUT_L2_HOST}:${L2_HTTP_PORT}/
      DATABASE_URL: postgresql://postgres:${BLOCKSCOUT_POSTGRES_PASSWORD}@l2-blockscout-postgres:5432/blockscout
      ETHEREUM_JSONRPC_VARIANT: nethermind
      ETHEREUM_JSONRPC_TRACE_URL: http://${BLOCKSCOUT_L2_HOST}:${L2_HTTP_PORT}/
      SUBNETWORK: Surge
      API_V2_ENABLED: true
      PORT: ${BLOCKSCOUT_PORT}
      NETWORK: Surge
      MICROSERVICE_SC_VERIFIER_TYPE: sc_verifier
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: true
      COIN: ETH
      MICROSERVICE_SC_VERIFIER_ENABLED: true
      SECRET_KEY_BASE: 56NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76chXeN
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      DISABLE_WEBAPP: true
      ADMIN_PANEL_ENABLED: false
      DISABLE_API:
      API_V1_READ_METHODS_DISABLED:
      API_V1_WRITE_METHODS_DISABLED:
      CHAIN_TYPE:
      BRIDGED_TOKENS_ENABLED:
      API_GRAPHQL_MAX_COMPLEXITY:
      RELEASE_VERSION: 8.1.1
      BLOCKSCOUT_VERSION: v8.1.1
    command:
      - "/bin/sh"
      - "-c"
      - "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - blockscout

  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: l2-blockscout-frontend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      nethermind_execution_client:
        condition: service_healthy
      taiko_client_driver:
        condition: service_started
      blockscout-postgres:
        condition: service_started
      blockscout-verifer:
        condition: service_started
      blockscout:
        condition: service_started
    ports:
      - ${BLOCKSCOUT_FRONTEND_PORT}:${BLOCKSCOUT_FRONTEND_PORT}
    environment:
      PORT: ${BLOCKSCOUT_FRONTEND_PORT}
      NEXT_PUBLIC_NETWORK_ICON: https://docs.surge.wtf/img/favicon.ico
      NEXT_PUBLIC_NETWORK_ID: ${L2_CHAIN_ID}
      NEXT_PUBLIC_APP_PROTOCOL: http
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_AD_BANNER_PROVIDER: none
      NEXT_PUBLIC_HAS_BEACON_CHAIN: false
      NEXT_PUBLIC_GAS_TRACKER_ENABLED: true
      # NEXT_PUBLIC_DISABLE_EXCHANGE_RATES: true
      NEXT_PUBLIC_NETWORK_NAME: Surge
      NEXT_PUBLIC_APP_HOST: 127.0.0.1
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: ${BLOCKSCOUT_API_HOST}:${BLOCKSCOUT_PORT}
      NEXT_PUBLIC_USE_NEXT_JS_PROXY: false
      # Browser-facing — must resolve from outside the docker network.
      # BLOCKSCOUT_API_HOST is set to "localhost" (local) or the VM IP
      # (remote) by configure_remote_blockscout in helpers.sh.
      NEXT_PUBLIC_NETWORK_RPC_URL: http://${BLOCKSCOUT_API_HOST}:${L2_HTTP_PORT}
      NEXT_PUBLIC_IS_TESTNET: true
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_APP_PORT: ${BLOCKSCOUT_FRONTEND_PORT}
      NEXT_PUBLIC_NETWORK_VERIFICATION_TYPE: validation
      NEXT_PUBLIC_AD_TEXT_PROVIDER: none
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      NODE_VERSION: 22.11.0
      YARN_VERSION: 1.22.22
      ENVS_PRESET:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - surge
    labels:
      com.kurtosistech.custom.logs_enabled: "true"
      com.kurtosistech.custom.custom_network: "devnet"
    profiles:
      - blockscout

  dex:
    build:
      context: ./surge-taiko-mono/packages/cross-chain-dex-ui
      dockerfile: Dockerfile
      target: dev
    container_name: dex
    restart: always
    ports:
      - 5173:5173
    env_file:
      - ./surge-taiko-mono/packages/cross-chain-dex-ui/.env
    environment:
      # Used only by the prod (target: runtime) image's nginx template
      # (cross-chain-dex-ui/nginx.conf → /etc/nginx/templates/default.conf.template).
      # The dev target above doesn't run nginx, but setting it here keeps the
      # prod path build-able from this same compose file.
      BUILDER_URL: ${L2_CATALYST:-http://host.docker.internal:4545}
    volumes:
      - ./surge-taiko-mono/packages/cross-chain-dex-ui/.env:/app/.env:ro
    networks:
      - surge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dex

networks:
  surge:
    name: surge-network
    external: true
